name: Build and push Docker image

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.cursor/**'
      - '.vscode/**'

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve short SHA
        id: short-sha
        run: echo "short-sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ github.event.repository.name }}:scan
          secrets: |
            vaultspeed_username=${{ secrets.VAULTSPEED_USERNAME }}
            vaultspeed_password=${{ secrets.VAULTSPEED_PASSWORD }}

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Update Grype vulnerability database
        run: grype db update

      - name: Scan image for critical vulnerabilities
        run: grype ${{ github.event.repository.name }}:scan --fail-on critical --only-fixed -o table

      - name: Log in to Azure ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CONTAINER_REGISTRY }}
          username: ${{ secrets.CONTAINER_REGISTRY_USER }}
          password: ${{ secrets.VSLABS_IMAGE_PUSH_TOKEN }}

      - name: Push image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.CONTAINER_REGISTRY }}/${{ github.event.repository.name }}:${{ github.ref_name }}-${{ steps.short-sha.outputs.short-sha }}
          secrets: |
            vaultspeed_username=${{ secrets.VAULTSPEED_USERNAME }}
            vaultspeed_password=${{ secrets.VAULTSPEED_PASSWORD }}
